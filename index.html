<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>anonyums</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      margin: 0;
      height: 100vh;
      background: #ffd6e8;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Floating hearts */
    .heart {
      position: absolute;
      color: rgba(255, 105, 180, 0.6);
      font-size: 20px;
      animation: floatUp 6s linear infinite;
      pointer-events: none;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(100vh) scale(1);
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh) scale(1.5);
        opacity: 0;
      }
    }

    /* Center dialog */
    .card {
      background: white;
      padding: 30px 20px;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      z-index: 10;
      width: 90%;
      max-width: 360px;
    }

    .card h1 {
      color: #ff4d88;
      margin-bottom: 25px;
      font-size: 22px;
      white-space: nowrap; /* ✅ single line */
    }

    .buttons {
      position: relative;
      height: 60px;
    }

    button {
      padding: 10px 22px;
      border: none;
      border-radius: 20px;
      font-size: 16px;
      cursor: pointer;
    }

    #yes {
      background: #ff4d88;
      color: white;
      position: absolute;
      left: 40px;
    }

    #no {
      background: #ccc;
      color: #333;
      position: absolute;
      right: 40px;
    }

    /* Mobile tweak */
    @media (max-width: 400px) {
      .card h1 {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>

  <div class="card" id="card">
    <h1>maaf kar do please 🙏</h1>
    <div class="buttons">
      <button id="yes">Yes</button>
      <button id="no">No</button>
    </div>
  </div>

  <script>
    // Floating hearts
    setInterval(() => {
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = "❤️";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = (16 + Math.random() * 20) + "px";
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 6000);
    }, 300);

    // NO button runs away (mouse + touch)
    const noBtn = document.getElementById("no");

    function moveNo() {
      const x = Math.random() * 200 - 100;
      const y = Math.random() * 120 - 60;
      noBtn.style.transform = `translate(${x}px, ${y}px)`;
    }

    noBtn.addEventListener("mouseenter", moveNo);
    noBtn.addEventListener("touchstart", moveNo);

    // YES click → Thank you + GIF
    document.getElementById("yes").addEventListener("click", () => {
      document.getElementById("card").innerHTML = `
        <h1>Thank You ❤️🥰</h1>
        <img 
          src="https://media.giphy.com/media/26FLdmIp6wJr91JAI/giphy.gif" 
          alt="Love GIF"
          style="width:100%; border-radius:12px; margin-top:15px;"
        />
      `;
    });
  </script>

</body>
</html>
